<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 28px;
}

select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin: 15px 0;
  font-size: 16px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  transition: 0.2s;
}

.card.completed {
  opacity: 0.5;
  text-decoration: line-through;
}

input[type="checkbox"] {
  margin-right: 15px;
  transform: scale(1.3);
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.progress {
  margin-top: 15px;
  text-align: center;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>
<div class="container">

<h1>🏋️ Workout Tracker</h1>

<select id="daySelector">
  <option value="day1">Day 1 - Upper</option>
  <option value="day2">Day 2 - Lower</option>
  <option value="day3">Day 3 - Mobility</option>
  <option value="day4">Day 4 - Full</option>
  <option value="day5">Day 5 - Mobility</option>
  <option value="day6">Day 6 - Light</option>
  <option value="day7">Day 7 - Rest</option>
</select>

<div id="list"></div>

<div class="progress" id="progressText"></div>

<button onclick="resetDay()">Reset Day</button>

</div>

<script>
const workouts = {
  day1: ["Pull-Ups","Push-Ups","Rows","Shoulder Press","Face Pulls","Shrugs","Wall Angels","Chin Tucks"],
  day2: ["Goblet Squats","RDLs","Reverse Lunges","Calf Raises","Plank","Dead Bugs"],
  day3: ["Foam Rolling","Cat-Cow","Child’s Pose","Hanging","Thoracic Extensions","Band Pull-Aparts","Wall Hold"],
  day4: ["Pull-Ups","Deadlift","Push-Ups","Rows","Lateral Raises","Hammer Curls","Side Plank"],
  day5: ["Foam Rolling","Hip Flexor Stretch","Hamstring Stretch","Chest Stretch","Bird Dogs","Plank","Chin Tucks"],
  day6: ["Step-Ups","Goblet Squat","RDL","Band Walks","Light Walk/Jog"],
  day7: ["Rest Day 😴"]
};

const list = document.getElementById("list");
const selector = document.getElementById("daySelector");
const progressText = document.getElementById("progressText");

function loadDay(day) {
  list.innerHTML = "";
  let completed = 0;

  workouts[day].forEach((exercise, index) => {
    const div = document.createElement("div");
    div.className = "card";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";

    const saved = localStorage.getItem(day + "-" + index);
    if (saved === "true") {
      checkbox.checked = true;
      div.classList.add("completed");
      completed++;
    }

    checkbox.addEventListener("change", () => {
      localStorage.setItem(day + "-" + index, checkbox.checked);
      div.classList.toggle("completed");
      updateProgress(day);
    });

    const text = document.createElement("span");
    text.textContent = exercise;

    div.appendChild(checkbox);
    div.appendChild(text);
    list.appendChild(div);
  });

  updateProgress(day);
}

function updateProgress(day) {
  let total = workouts[day].length;
  let done = 0;

  workouts[day].forEach((_, i) => {
    if (localStorage.getItem(day + "-" + i) === "true") {
      done++;
    }
  });

  progressText.textContent = `Progress: ${done}/${total} completed`;
}

function resetDay() {
  const day = selector.value;
  workouts[day].forEach((_, i) => {
    localStorage.removeItem(day + "-" + i);
  });
  loadDay(day);
}

selector.addEventListener("change", () => {
  loadDay(selector.value);
});

loadDay("day1");
</script>

</body>
</html>
