<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Workout Tracker</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 520px;
  margin: auto;
  padding: 20px;
}

h1 { text-align: center; }

select, button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin: 8px 0;
  font-size: 16px;
}

.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

.card.completed {
  opacity: 0.5;
  text-decoration: line-through;
}

.timer {
  text-align: center;
  font-size: 22px;
  margin: 10px 0;
}

details {
  font-size: 14px;
  opacity: 0.85;
}
</style>
</head>

<body>
<div class="container">

<h1>🏋️ Workout Tracker</h1>

<select id="selector"></select>

<div class="timer" id="timer">⏱ 60</div>
<button onclick="startTimer()">Start Rest Timer</button>
<button onclick="resetTimer()">Reset Timer</button>

<div id="list"></div>

<div id="progress"></div>

<button onclick="resetDay()">Reset Day</button>

</div>

<script>
const plan = {

"Week 1 - Upper": [
{n:"Push-Ups", r:"10x3", d:"Keep body straight."},
{n:"Pull-Ups", r:"5x3", d:"Pull chin over bar."},
{n:"Rows", r:"10x3", d:"Pull to hip."},
{n:"Plank", r:"30 sec x3", t:30, d:"Hold straight body."},
{n:"Wall Sit", r:"30 sec x3", t:30, d:"Back flat on wall."}
],

"Week 1 - Lower": [
{n:"Goblet Squat", r:"12x3", d:"Chest up."},
{n:"RDL", r:"10x3", d:"Hinge hips."},
{n:"Calf Raises", r:"15x3", d:"Slow reps."},
{n:"Wall Sit", r:"35 sec x3", t:35, d:"Hold position."}
],

"Week 2 - Upper": [
{n:"Push-Ups", r:"12x3"},
{n:"Pull-Ups", r:"6x3"},
{n:"Rows", r:"12x3"},
{n:"Plank", r:"40 sec x3", t:40},
{n:"Wall Sit", r:"40 sec x3", t:40}
],

"Week 2 - Lower": [
{n:"Goblet Squat", r:"15x3"},
{n:"RDL", r:"12x3"},
{n:"Calf Raises", r:"18x3"},
{n:"Wall Sit", r:"45 sec x3", t:45}
],

"Week 3 - Upper": [
{n:"Push-Ups", r:"15x3"},
{n:"Pull-Ups", r:"7x3"},
{n:"Rows", r:"12x3 heavier"},
{n:"Plank", r:"45 sec x3", t:45},
{n:"Wall Sit", r:"50 sec x3", t:50}
],

"Week 3 - Lower": [
{n:"Goblet Squat", r:"15x3 heavier"},
{n:"RDL", r:"12x3"},
{n:"Calf Raises", r:"20x3"},
{n:"Wall Sit", r:"55 sec x3", t:55}
],

"Week 4 - Upper": [
{n:"Push-Ups", r:"18x3"},
{n:"Pull-Ups", r:"8x3"},
{n:"Rows", r:"15x3"},
{n:"Plank", r:"60 sec x3", t:60},
{n:"Wall Sit", r:"60 sec x3", t:60}
],

"Week 4 - Lower": [
{n:"Goblet Squat", r:"18x3"},
{n:"RDL", r:"15x3"},
{n:"Calf Raises", r:"20x3"},
{n:"Wall Sit", r:"60 sec x3", t:60}
]

};

const selector = document.getElementById("selector");
const list = document.getElementById("list");
const progress = document.getElementById("progress");
const timerDisplay = document.getElementById("timer");

let timer = 60;
let interval;

// dropdown
Object.keys(plan).forEach(day=>{
  let o=document.createElement("option");
  o.value=day;
  o.textContent=day;
  selector.appendChild(o);
});

function loadDay(day){
  list.innerHTML="";

  plan[day].forEach((ex,i)=>{
    let card=document.createElement("div");
    card.className="card";

    let check=document.createElement("input");
    check.type="checkbox";

    if(localStorage.getItem(day+i)==="true"){
      check.checked=true;
      card.classList.add("completed");
    }

    check.onchange=()=>{
      localStorage.setItem(day+i,check.checked);
      card.classList.toggle("completed");
      update(day);
    };

    let title=document.createElement("div");
    title.textContent=`${ex.n} (${ex.r})`;

    // timer button for timed exercises
    if(ex.t){
      let btn=document.createElement("button");
      btn.textContent="Start Exercise Timer";
      btn.onclick=()=>startExerciseTimer(ex.t);
      card.appendChild(btn);
    }

    let details=document.createElement("details");
    let sum=document.createElement("summary");
    sum.textContent="How to do it";
    let desc=document.createElement("div");
    desc.textContent=ex.d || "Perform with good form.";

    details.appendChild(sum);
    details.appendChild(desc);

    card.appendChild(check);
    card.appendChild(title);
    card.appendChild(details);

    list.appendChild(card);
  });

  update(day);
}

function update(day){
  let done=0;
  let total=plan[day].length;

  plan[day].forEach((_,i)=>{
    if(localStorage.getItem(day+i)==="true") done++;
  });

  progress.textContent=`Progress: ${done}/${total}`;
}

// REST TIMER
function startTimer(){
  clearInterval(interval);
  interval=setInterval(()=>{
    timer--;
    timerDisplay.textContent="⏱ "+timer;
    if(timer<=0){
      clearInterval(interval);
      alert("Rest done!");
    }
  },1000);
}

function resetTimer(){
  clearInterval(interval);
  timer=60;
  timerDisplay.textContent="⏱ 60";
}

// EXERCISE TIMER
function startExerciseTimer(seconds){
  clearInterval(interval);
  timer=seconds;
  timerDisplay.textContent="⏱ "+timer;

  interval=setInterval(()=>{
    timer--;
    timerDisplay.textContent="⏱ "+timer;
    if(timer<=0){
      clearInterval(interval);
      alert("Done!");
    }
  },1000);
}

function resetDay(){
  let day=selector.value;
  plan[day].forEach((_,i)=>localStorage.removeItem(day+i));
  loadDay(day);
}

selector.onchange=()=>loadDay(selector.value);

loadDay(Object.keys(plan)[0]);
</script>

</body>
</html>
